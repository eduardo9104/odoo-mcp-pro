<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - Odoo MCP Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-950">
    <div class="flex min-h-full flex-col justify-center py-12 sm:px-6 lg:px-8">
        <div class="sm:mx-auto sm:w-full sm:max-w-md">
            <div class="mx-auto w-16 h-16 bg-red-100 dark:bg-red-900 rounded-2xl flex items-center justify-center">
                <svg class="w-10 h-10 text-red-600 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/>
                </svg>
            </div>
            <h2 class="mt-6 text-center text-2xl font-bold tracking-tight text-gray-900 dark:text-white">
                Access Denied
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600 dark:text-gray-400">
                {{ message | default("You are not authorized to access the admin panel.") }}
            </p>
            {% if email %}
            <p class="mt-4 text-center text-sm text-gray-500 dark:text-gray-500">
                Signed in as <span class="font-medium text-gray-700 dark:text-gray-300">{{ email }}</span>
            </p>
            {% endif %}
        </div>

        <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
            <div class="bg-white dark:bg-gray-900 py-6 px-6 shadow-sm rounded-xl border border-gray-200 dark:border-gray-800 sm:px-10">
                <p class="text-sm text-gray-600 dark:text-gray-400 text-center mb-4">
                    Contact your administrator to request access.
                </p>
                <a href="/admin/login"
                   class="flex w-full justify-center rounded-lg bg-gray-100 dark:bg-gray-800 px-4 py-2.5 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    Back to login
                </a>
            </div>
        </div>
    </div>
</body>
</html>
