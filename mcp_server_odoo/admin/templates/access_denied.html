<!DOCTYPE html>
<html lang="en" class="h-full dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - Odoo MCP by Pantalytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'Lexend';
            src: url('https://brand.pantalytics.com/fonts/Lexend-Medium.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Instrument Sans';
            src: url('https://brand.pantalytics.com/fonts/InstrumentSans-Regular.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Instrument Sans';
            src: url('https://brand.pantalytics.com/fonts/InstrumentSans-Medium.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Instrument Sans';
            src: url('https://brand.pantalytics.com/fonts/InstrumentSans-Bold.woff2') format('woff2');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#001d21',
                            surface: '#002328',
                            accent: '#9b99ff',
                            'accent-hover': '#7370ff',
                        },
                    },
                    fontFamily: {
                        heading: ['Lexend', 'sans-serif'],
                        body: ['Instrument Sans', 'sans-serif'],
                    },
                },
            },
        }
    </script>
</head>
<body class="h-full bg-brand-bg font-body">
    <div class="flex min-h-full flex-col justify-center py-12 sm:px-6 lg:px-8">
        <div class="sm:mx-auto sm:w-full sm:max-w-md">
            <div class="mx-auto w-16 h-16 bg-red-900 rounded-2xl flex items-center justify-center">
                <svg class="w-10 h-10 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/>
                </svg>
            </div>
            <h2 class="mt-6 text-center text-2xl font-heading font-medium tracking-tight text-white">
                Access Denied
            </h2>
            <p class="mt-2 text-center text-sm text-white/60">
                {{ message | default("You are not authorized to access the admin panel.") }}
            </p>
            {% if email %}
            <p class="mt-4 text-center text-sm text-white/40">
                Signed in as <span class="font-medium text-white/80">{{ email }}</span>
            </p>
            {% endif %}
        </div>

        <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
            <div class="bg-brand-surface py-6 px-6 shadow-sm rounded-xl border border-white/10 sm:px-10">
                <p class="text-sm text-white/60 text-center mb-4">
                    Contact your administrator to request access.
                </p>
                <a href="/admin/login"
                   class="flex w-full justify-center rounded-lg bg-white/10 px-4 py-2.5 text-sm font-medium text-white hover:bg-white/15 transition-colors">
                    Back to login
                </a>
            </div>
        </div>
    </div>
</body>
</html>
