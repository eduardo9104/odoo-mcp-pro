<!DOCTYPE html>
<html lang="en" class="h-full dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} - Odoo MCP by Pantalytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        @font-face {
            font-family: 'Lexend';
            src: url('https://brand.pantalytics.com/fonts/Lexend-Medium.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Instrument Sans';
            src: url('https://brand.pantalytics.com/fonts/InstrumentSans-Regular.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Instrument Sans';
            src: url('https://brand.pantalytics.com/fonts/InstrumentSans-Medium.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Instrument Sans';
            src: url('https://brand.pantalytics.com/fonts/InstrumentSans-Bold.woff2') format('woff2');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#001d21',
                            surface: '#002328',
                            accent: '#9b99ff',
                            'accent-hover': '#7370ff',
                            navy: '#1b3a5c',
                            gold: '#e8a317',
                        },
                    },
                    fontFamily: {
                        heading: ['Lexend', 'sans-serif'],
                        body: ['Instrument Sans', 'sans-serif'],
                    },
                },
            },
        }
    </script>
</head>
<body class="h-full bg-brand-bg font-body">
    <div class="min-h-full">
        <!-- Sidebar -->
        <div class="fixed inset-y-0 left-0 z-50 w-64 bg-brand-surface border-r border-white/10 hidden lg:block">
            <!-- Logo -->
            <div class="flex items-center h-16 px-6 border-b border-white/10">
                <div class="flex items-center space-x-3">
                    <img src="https://brand.pantalytics.com/images/logo/icon-blue.png" alt="Pantalytics" class="w-8 h-8">
                    <span class="text-lg font-heading font-medium text-white">Pantalytics</span>
                </div>
            </div>

            <!-- Navigation -->
            <nav class="px-4 py-4 space-y-1">
                <a href="/admin/" class="flex items-center px-3 py-2 text-sm font-medium rounded-lg {% if not active_nav or active_nav == 'databases' %}bg-brand-accent/15 text-brand-accent{% else %}text-white/60 hover:bg-white/5 hover:text-white{% endif %}">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"/>
                    </svg>
                    Tenants
                </a>
            </nav>
        </div>

        <!-- Main content -->
        <div class="lg:pl-64">
            <!-- Top bar -->
            <div class="sticky top-0 z-40 h-16 bg-brand-surface border-b border-white/10 flex items-center justify-between px-6">
                <!-- Mobile menu button -->
                <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="lg:hidden p-2 rounded-md text-white/60 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>

                <div class="flex-1"></div>

                <!-- User info -->
                {% if admin %}
                <div class="flex items-center space-x-4">
                    <a href="/admin/setup" class="text-xs text-brand-accent hover:text-brand-accent-hover">My setup</a>
                    <span class="text-sm text-white/60">{{ admin.email }}</span>
                    <a href="/admin/logout" class="text-white/60 hover:text-white">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                    </a>
                </div>
                {% endif %}
            </div>

            <!-- Mobile menu -->
            <div id="mobile-menu" class="hidden lg:hidden bg-brand-surface border-b border-white/10 px-4 py-3">
                <a href="/admin/" class="block px-3 py-2 text-sm font-medium text-white/60 rounded-lg hover:bg-white/5 hover:text-white">Databases</a>
                {% if admin %}
                <a href="/admin/logout" class="block px-3 py-2 text-sm font-medium text-white/60 rounded-lg hover:bg-white/5 hover:text-white">Logout</a>
                {% endif %}
            </div>

            <!-- Flash messages -->
            {% if error %}
            <div class="mx-6 mt-4 rounded-lg bg-red-950 p-4 border border-red-800">
                <div class="flex">
                    <svg class="h-5 w-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <p class="ml-3 text-sm text-red-300">{{ error }}</p>
                </div>
            </div>
            {% endif %}

            {% if success %}
            <div class="mx-6 mt-4 rounded-lg bg-green-950 p-4 border border-green-800">
                <div class="flex">
                    <svg class="h-5 w-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                    <p class="ml-3 text-sm text-green-300">{{ success }}</p>
                </div>
            </div>
            {% endif %}

            <!-- Page content -->
            <main class="px-6 py-8">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>
