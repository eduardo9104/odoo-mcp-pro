<!DOCTYPE html>
<html lang="en" class="h-full dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Odoo MCP by Pantalytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'Lexend';
            src: url('https://brand.pantalytics.com/fonts/Lexend-Medium.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Instrument Sans';
            src: url('https://brand.pantalytics.com/fonts/InstrumentSans-Regular.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Instrument Sans';
            src: url('https://brand.pantalytics.com/fonts/InstrumentSans-Medium.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Instrument Sans';
            src: url('https://brand.pantalytics.com/fonts/InstrumentSans-Bold.woff2') format('woff2');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#001d21',
                            surface: '#002328',
                            accent: '#9b99ff',
                            'accent-hover': '#7370ff',
                        },
                    },
                    fontFamily: {
                        heading: ['Lexend', 'sans-serif'],
                        body: ['Instrument Sans', 'sans-serif'],
                    },
                },
            },
        }
    </script>
</head>
<body class="h-full bg-brand-bg font-body">
    <div class="flex min-h-full flex-col justify-center py-12 sm:px-6 lg:px-8">
        <div class="sm:mx-auto sm:w-full sm:max-w-md">
            <!-- Logo -->
            <img src="https://brand.pantalytics.com/images/logo/icon-blue.png" alt="Pantalytics" class="mx-auto h-16 w-16">
            <h2 class="mt-6 text-center text-2xl font-heading font-medium tracking-tight text-white">
                Odoo MCP
            </h2>
            <p class="mt-2 text-center text-sm text-white/60">
                Connect your Odoo ERP to Claude AI.
            </p>
        </div>

        <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
            <div class="bg-brand-surface py-8 px-6 shadow-sm rounded-xl border border-white/10 sm:px-10 space-y-4">
                <a href="/admin/login/start"
                   class="flex w-full justify-center items-center rounded-lg bg-brand-accent px-4 py-3 text-sm font-semibold text-white shadow-sm hover:bg-brand-accent-hover transition-colors">
                    Sign in
                </a>
                <a href="/admin/login/start?action=register"
                   class="flex w-full justify-center items-center rounded-lg border border-white/20 px-4 py-3 text-sm font-semibold text-white shadow-sm hover:bg-white/5 transition-colors">
                    Create free account
                </a>
            </div>

            <p class="mt-6 text-center text-xs text-white/40">
                Odoo MCP by Pantalytics
            </p>
        </div>
    </div>
</body>
</html>
